<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register - Student Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .animated-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: rise 10s infinite ease-in;
        }

        @keyframes rise {
            to {
                bottom: 110%;
                transform: translateX(100px);
            }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 25px;
            width: 400px;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 60px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h2 {
            font-weight: 600;
            letter-spacing: 1px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff4b7d;
            z-index: 1;
        }

        .form-control {
            border-radius: 15px;
            padding: 12px 15px 12px 45px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s;
        }

        .form-control:focus {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            background: white;
            outline: none;
        }

        .btn-custom {
            background: white;
            color: #ff4b7d;
            font-weight: 600;
            border-radius: 15px;
            padding: 12px;
            border: none;
            transition: all 0.3s;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            background: #ffeb3b;
            color: #ff4b7d;
        }

        .btn-custom:active {
            transform: translateY(0);
        }

        .link-text {
            color: #ffeb3b;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .link-text:hover {
            color: white;
            text-decoration: underline;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
        }

        .divider span {
            background: transparent;
            padding: 0 10px;
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>

<div class="animated-bg">
    <div class="bubble" style="width: 80px; height: 80px; left: 10%; animation-delay: 0s;"></div>
    <div class="bubble" style="width: 60px; height: 60px; left: 30%; animation-delay: 2s;"></div>
    <div class="bubble" style="width: 100px; height: 100px; left: 50%; animation-delay: 4s;"></div>
    <div class="bubble" style="width: 70px; height: 70px; left: 70%; animation-delay: 1s;"></div>
    <div class="bubble" style="width: 90px; height: 90px; left: 85%; animation-delay: 3s;"></div>
</div>

<div class="glass-card">
    <div class="logo-container">
        <div class="logo-icon">
            <i class="fas fa-user-plus"></i>
        </div>
        <h2>Create Account</h2>
        <p class="mb-0">Join us today!</p>
    </div>

    <form onsubmit="registerUser(event)">
        <div class="input-group">
            <i class="fas fa-user input-icon"></i>
            <input type="text" 
                   id="registerUsername" 
                   class="form-control" 
                   placeholder="Username"
                   required>
        </div>

        <div class="input-group">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" 
                   id="registerPassword" 
                   class="form-control" 
                   placeholder="Password"
                   required>
        </div>

        <button type="submit" class="btn btn-custom w-100">
            <i class="fas fa-user-check me-2"></i>
            Register
        </button>
    </form>

    <div class="divider">
        <span>or</span>
    </div>

    <p class="text-center mb-0">
        Already have account? <a href="login.html" class="link-text">Login</a>
    </p>
</div>

<script>
    async function registerUser(event) {
        event.preventDefault();
        
        const username = document.getElementById("registerUsername").value.trim();
        const password = document.getElementById("registerPassword").value.trim();

        if (!username) {
            alert("Username cannot be empty");
            return;
        }

        if (!password) {
            alert("Password cannot be empty");
            return;
        }

        if (username.length < 3) {
            alert("Username must be at least 3 characters");
            return;
        }

        if (password.length < 6) {
            alert("Password must be at least 6 characters");
            return;
        }

        try {
            const response = await fetch("http://localhost:8081/users/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            const result = await response.text();
            alert(result);

            if (result === "Registration Successful") {
                window.location.href = "login.html";
            }

        } catch (error) {
            console.error("Error:", error);
            alert("Something went wrong!");
        }
    }
</script>

</body>
</html>
