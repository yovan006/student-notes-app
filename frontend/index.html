<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Student Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Animated Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="fas fa-book-open me-2"></i>
            <span class="brand-text">Student Notes</span>
        </a>
        <div class="ms-auto d-flex align-items-center">
            <span class="text-white me-3 user-greeting">
                <i class="fas fa-user-circle me-1"></i>
                Welcome!
            </span>
            <button onclick="logout()" class="btn btn-logout">
                <i class="fas fa-sign-out-alt me-1"></i>
                Logout
            </button>
        </div>
    </div>
</nav>

<div class="container py-5">

    <!-- Note Input Card -->
    <div class="card note-input-card shadow-lg mb-5">
        <div class="card-body p-4">
            <h4 class="card-title mb-4">
                <i class="fas fa-pen-fancy me-2"></i>
                <span id="formTitle">Create New Note</span>
            </h4>
            
            <input type="hidden" id="editId">

            <div class="mb-3">
                <label class="form-label">
                    <i class="fas fa-heading me-1"></i>
                    Title
                </label>
                <input type="text"
                       id="noteTitle"
                       class="form-control form-input"
                       placeholder="Enter note title...">
            </div>

            <div class="mb-4">
                <label class="form-label">
                    <i class="fas fa-align-left me-1"></i>
                    Content
                </label>
                <textarea id="noteContent"
                          class="form-control form-input"
                          rows="4"
                          placeholder="Write your note here..."></textarea>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-save flex-grow-1" onclick="saveNote()">
                    <i class="fas fa-save me-2"></i>
                    <span id="saveButtonText">Save Note</span>
                </button>
                <button class="btn btn-cancel" onclick="cancelEdit()" id="cancelBtn" style="display: none;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Notes Grid -->
    <div class="notes-header mb-4">
        <h3>
            <i class="fas fa-sticky-note me-2"></i>
            My Notes
        </h3>
    </div>
    
    <div class="row g-4" id="notesContainer">
        <!-- Notes will be loaded here -->
    </div>

</div>

<!-- Toast Container -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1050">
    <div id="toastMsg" class="toast align-items-center text-white bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="toastBody">
                Hello, this is a toast message!
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    async function checkSession() {
        try {
            const response = await fetch("http://localhost:8081/notes", {
                credentials: "include"
            });

            if (!response.ok) {
                window.location.replace("login.html");
            }
        } catch (error) {
            window.location.replace("login.html");
        }
    }

    async function loadNotes() {
        const response = await fetch("http://localhost:8081/notes", {
            credentials: "include"
        });

        if (!response.ok) {
            window.location.replace("login.html");
            return;
        }

        const notes = await response.json();
        const container = document.getElementById("notesContainer");
        container.innerHTML = "";

        notes.forEach(note => {
            container.innerHTML += `
                <div class="col-lg-4 col-md-6">
                    <div class="note-card">
                        <div class="note-header">
                            <h5 class="note-title">
                                <i class="fas fa-file-alt me-2"></i>
                                ${escapeHtml(note.title)}
                            </h5>
                        </div>
                        <p class="note-content">${escapeHtml(note.content)}</p>

                        <div class="note-actions">
                            <button class="btn btn-edit"
                                onclick='editNote(${note.id}, \`${escapeHtml(note.title)}\`, \`${escapeHtml(note.content)}\`)'>
                                <i class="fas fa-edit me-1"></i>
                                Edit
                            </button>

                            <button class="btn btn-delete"
                                onclick="deleteNote(${note.id})">
                                <i class="fas fa-trash-alt me-1"></i>
                                Delete
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function showToast(message, type = "primary") {
        const toastEl = document.getElementById("toastMsg");
        const toastBody = document.getElementById("toastBody");

        toastEl.className = `toast align-items-center text-white bg-${type} border-0`;
        toastBody.textContent = message;

        const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
        toast.show();
    }

    async function saveNote() {
        const id = document.getElementById("editId").value;
        const title = document.getElementById("noteTitle").value.trim();
        const content = document.getElementById("noteContent").value.trim();

        if (!title || !content) {
            showToast("Please fill all fields", "warning");
            return;
        }

        const note = { title, content };

        try {
            let response;
            if (id) {
                response = await fetch(`http://localhost:8081/notes/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify(note)
                });
            } else {
                response = await fetch("http://localhost:8081/notes", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify(note)
                });
            }

            const result = await response.json();

            if (id && !result) {
                showToast("Note not updated", "danger");
            } else {
                showToast(id ? "Note updated" : "Note created", "success");
            }

            document.getElementById("editId").value = "";
            document.getElementById("noteTitle").value = "";
            document.getElementById("noteContent").value = "";
            cancelEdit();

            loadNotes();
        } catch (error) {
            console.error("Error saving note:", error);
            showToast("Something went wrong", "danger");
        }
    }

    function editNote(id, title, content) {
        document.getElementById("editId").value = id;
        document.getElementById("noteTitle").value = title;
        document.getElementById("noteContent").value = content;
        document.getElementById("formTitle").textContent = "Edit Note";
        document.getElementById("saveButtonText").textContent = "Update Note";
        document.getElementById("cancelBtn").style.display = "block";
        
        // Smooth scroll to form
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEdit() {
        document.getElementById("editId").value = "";
        document.getElementById("noteTitle").value = "";
        document.getElementById("noteContent").value = "";
        document.getElementById("formTitle").textContent = "Create New Note";
        document.getElementById("saveButtonText").textContent = "Save Note";
        document.getElementById("cancelBtn").style.display = "none";
    }

    async function deleteNote(id) {
        await fetch(`http://localhost:8081/notes/${id}`, {
            method: "DELETE",
            credentials: "include"
        });
        showToast("Note deleted", "danger");
        loadNotes();
    }

    async function logout() {
        try {
            const response = await fetch("http://localhost:8081/users/logout", {
                method: "POST",
                credentials: "include"
            });

            if (response.ok) {
                showToast("Logged out", "info");

                setTimeout(() => {
                    window.location.replace("login.html");
                }, 500);
            } else {
                showToast("Logout failed", "danger");
            }
        } catch (error) {
            console.error("Logout error:", error);
            showToast("Something went wrong", "danger");
        }
    }

    checkSession();
    loadNotes();
</script>

</body>
</html>
